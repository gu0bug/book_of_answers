<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>答案之书</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#d4af37;--bg:#0b0d12;--text:#eae6dc;}
*{box-sizing:border-box}
body{margin:0;font-family:'Playfair Display',serif;background:radial-gradient(circle at top,#1a1d26,#0b0d12);color:var(--text);}
.container{max-width:420px;min-height:100vh;margin:auto;display:flex;flex-direction:column;justify-content:center;padding:20px;}
.screen{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.hidden{display:none}
.title{font-family:'Cinzel';font-size:clamp(20px,5vw,28px);color:var(--gold);letter-spacing:3px;margin-bottom:20px;text-align:center;}
.card{width:100%;padding:24px 18px;border-radius:16px;background:rgba(255,255,255,0.04);backdrop-filter:blur(12px);border:1px solid rgba(212,175,55,0.2);box-shadow:0 10px 40px rgba(0,0,0,0.5);}
.desc{font-size:14px;text-align:center;opacity:.8;margin-bottom:12px;}
input{width:100%;padding:14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:16px;outline:none;}
input:focus{border-color:var(--gold);box-shadow:0 0 8px rgba(212,175,55,0.5);}
button{width:100%;margin-top:16px;padding:14px;border:none;border-radius:30px;background:linear-gradient(135deg,#e6c35c,#caa52e);color:#000;font-weight:bold;font-size:16px;cursor:pointer;}
.center{display:flex;flex-direction:column;align-items:center;gap:20px}
.book{width:100px;height:160px;position:relative;transform-style:preserve-3d}
.page{position:absolute;width:100%;height:100%;background:linear-gradient(#f5e6c8,#e8d8b0);transform-origin:left;border-radius:6px;box-shadow:inset 0 0 10px rgba(0,0,0,0.2)}
.animating .page{animation:flip 1.2s infinite ease-in-out}
.page:nth-child(2){animation-delay:.2s}
.page:nth-child(3){animation-delay:.4s}
@keyframes flip{0%{transform:rotateY(0)}50%{transform:rotateY(-160deg)}100%{transform:rotateY(0)}}
.loading{font-size:14px;color:var(--gold);animation:breath 2s infinite}
@keyframes breath{0%,100%{opacity:.4}50%{opacity:1}}
.answer-text{font-size:clamp(18px,5vw,24px);color:var(--gold);margin-top:10px;text-align:center}
.small{font-size:13px;color:#aaa;text-align:center;word-break:break-word}
</style>
</head>
<body>

<div class="container">

<div class="screen" id="ask">
  <div class="title">答案之书</div>
  <div class="card">
    <div class="desc">写下你的问题，让答案找到你</div>
    <input id="q" placeholder="例如：我的事业会成功吗？" />
    <button onclick="go()">寻找答案</button>
  </div>
</div>

<div class="screen hidden center" id="t">
  <div class="book" id="book">
    <div class="page"></div>
    <div class="page"></div>
    <div class="page"></div>
  </div>
  <div class="loading">正在翻阅命运...</div>
</div>

<div class="screen hidden" id="a">
  <div class="title">答案之书</div>
  <div class="card">
    <div class="small" id="question"></div>
    <div class="answer-text" id="result"></div>
    <button onclick="reset()">再问一个</button>
  </div>
</div>

</div>

<script>
const answers=["顺其自然","时机未到","值得一试","需要更多信息","坚持会有结果","重新考虑","答案在你心中","行动起来","耐心等待","可能会成功"];

function go(){
  const q=document.getElementById('q').value.trim();
  if(!q){alert('请输入问题');return}

  document.getElementById('ask').classList.add('hidden');
  document.getElementById('t').classList.remove('hidden');
  document.getElementById('book').classList.add('animating');

  setTimeout(()=>{
    const ans=answers[Math.floor(Math.random()*answers.length)];
    document.getElementById('question').innerText=q;
    document.getElementById('result').innerText=ans;

    document.getElementById('book').classList.remove('animating');
    document.getElementById('t').classList.add('hidden');
    document.getElementById('a').classList.remove('hidden');
  },1500);
}

function reset(){
  document.getElementById('a').classList.add('hidden');
  document.getElementById('ask').classList.remove('hidden');
  document.getElementById('q').value='';
}
</script>

</body>
</html>
